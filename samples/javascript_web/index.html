<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App Insights Web SDK Sample</title>
    <!-- 1. Application Insights Web SDK (Snippet) -->
    <script
      type="text/javascript"
      src="https://js.monitor.azure.com/scripts/b/ai.2.min.js"
    ></script>
    <script type="text/javascript">
      var snippet = {
        config: {
          connectionString: "InstrumentationKey=YOUR_INSTRUMENTATION_KEY_HERE",
        },
      };
      var init = new Microsoft.ApplicationInsights.ApplicationInsights(snippet);
      var appInsights = init.loadAppInsights();

      // 페이지 뷰 자동 추적
      appInsights.trackPageView();
    </script>
  </head>
  <body>
    <h1>Application Insights Web SDK Sample</h1>
    <p>이 웹 페이지는 Azure Monitor로 텔레메트리 데이터를 전송합니다.</p>

    <button id="eventBtn">커스텀 이벤트 전송</button>
    <button id="errorBtn">에러 발생시키기</button>

    <script>
      document
        .getElementById("eventBtn")
        .addEventListener("click", function () {
          appInsights.trackEvent({
            name: "ButtonClick",
            properties: { buttonId: "eventBtn" },
          });
          alert("이벤트가 전송되었습니다!");
        });

      document
        .getElementById("errorBtn")
        .addEventListener("click", function () {
          // 이 에러는 App Insights "Exceptions" 섹션에 기록됩니다.
          try {
            throw new Error("브라우저에서 발생한 테스트 에러");
          } catch (ex) {
            appInsights.trackException({ exception: ex });
            alert("에러가 기록되었습니다!");
          }
        });
    </script>
  </body>
</html>
